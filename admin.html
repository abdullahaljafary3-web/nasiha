<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginBox">

    <h2 style="text-align:center;">🔐 تسجيل الدخول</h2>

    <div class="form">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">

        <button onclick="login()">دخول</button>
    </div>

</div>

<div id="adminPanel" style="display:none;">

    <h1 style="text-align:center;">✍️ لوحة التحكم</h1>

    <div class="form">

        <input type="text" id="title" placeholder="عنوان المقال">
        <input type="text" id="description" placeholder="الوصف">
        <input type="file" id="imageFile">

        <select id="category">
            <option>نصائح</option>
            <option>محاضرات</option>
            <option>خطب</option>
        </select>

      <textarea id="content" placeholder="اكتب محتوى المقال هنا"></textarea>

        <button onclick="addArticle()">نشر المقال</button>
        <button onclick="logout()">خروج</button>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="admin.js"></script>

</body>
</html>
