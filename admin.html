<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;">✍️ لوحة التحكم</h1>

<div class="form">

    <input type="text" id="title" placeholder="عنوان المقال">
    <input type="text" id="description" placeholder="الوصف">

    <select id="category">
        <option>نصائح</option>
        <option>تقنية</option>
        <option>علم</option>
    </select>

    <textarea id="content" placeholder="محتوى المقال"></textarea>

    <button onclick="addArticle()">نشر المقال</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="admin.js"></script>

</body>
</html>
