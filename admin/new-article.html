<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مقال جديد</title>

<link rel="stylesheet" href="css/admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/7/tinymce.min.js"></script>

</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<h2>📚 منصة النصيحة العلمية</h2>

<a href="index.html">الرئيسية</a>

<a href="articles.html">المقالات</a>

<a class="active" href="new-article.html">

مقال جديد

</a>

</aside>

<main class="content">

<h1>إضافة مقال جديد</h1>

<form id="articleForm">

<input
id="title"
type="text"
placeholder="عنوان المقال"
required>

<br><br>

<textarea
id="summary"
placeholder="ملخص المقال"
rows="4"></textarea>

<br><br>

<input
id="image"
type="text"
placeholder="رابط صورة الغلاف">

<br><br>

<input
id="category"
type="text"
placeholder="التصنيف">

<br><br>

<input
id="tags"
type="text"
placeholder="الوسوم (مفصولة بفواصل)">

<br><br>

<label>

<input
id="featured"
type="checkbox">

مقال مميز

</label>

<br><br>

<textarea id="editor"></textarea>

<br><br>

<button class="btn">

نشر المقال

</button>

</form>

</main>

</div>

<script type="module" src="js/editor.js"></script>

</body>

</html>
